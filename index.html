// ─── World Intro Screen ────────────────────────────────────────────────────────
const WorldIntroScreen = ({ world, onBegin, onBack }) => {
  const [hovered, setHovered] = useState(false);
  const playedRef = useRef(false);

  // Get the pre-built <audio> DOM element for this world
  const getAudioEl = () => document.getElementById("intro-audio-" + world.id);

  useEffect(() => {
    // Reset state when world changes
    playedRef.current = false;
    // Try autoplay — will work if a prior gesture exists (e.g. tapping the world on home screen)
    const timer = setTimeout(() => tryPlay(), 300);
    return () => {
      clearTimeout(timer);
      const el = getAudioEl();
      if (el) { el.pause(); el.currentTime = 0; }
    };
  }, [world.id]);

  // First tap anywhere on the intro screen triggers playback (satisfies autoplay policy)
  const tryPlay = () => {
    if (!playedRef.current) {
      playedRef.current = true;
      const el = getAudioEl();
      if (el) {
        el.volume = 0.45;
        el.load();
        const p = el.play();
        if (p !== undefined) {
          p.then(() => console.log("intro audio playing:", world.id))
           .catch((e) => {
             console.warn("intro audio failed:", world.id, e.message);
             // Reset so user can try again
             playedRef.current = false;
           });
        }
      } else {
        console.warn("audio element not found: intro-audio-" + world.id);
      }
    }
  };

  const stopAndDo = (fn) => {
    const el = getAudioEl();
    if (el) { el.pause(); el.currentTime = 0; }
    fn();
  };

  return (
    <div
      onClick={tryPlay}
      onTouchStart={tryPlay}
      style={{
      position: "fixed", inset: 0, zIndex: 20,
      display: "flex", alignItems: "center", justifyContent: "center",
      padding: "16px",
      backgroundImage: world.introImageUrl
        ? `url(${world.introImageUrl})`
        : world.bgImageUrl
        ? `url(${world.bgImageUrl})`
        : "none",
      backgroundColor: "#0f0a19",
      backgroundSize: "cover",
      backgroundPosition: "center center",
    }}>
      {/* Dark overlay — translucent so the illustration shows through */}
      <div style={{
        position: "absolute", inset: 0,
        backgroundColor: "rgba(10, 8, 20, 0.55)",
      }}/>

      {/* Back button — top-left, above frosted layer */}
      <button
        onClick={() => stopAndDo(onBack)}
        style={{
          position: "absolute", top: 16, left: 16, zIndex: 2,
          background: "rgba(255,255,255,0.08)",
          border: "1px solid rgba(255,255,255,0.15)",
          color: "#fff", borderRadius: "10px",
          padding: "6px 14px", fontSize: "13px",
          cursor: "pointer", fontFamily: "Georgia,serif",
        }}
      >← Back</button>

      {/* Audio toggle button — top-right of intro screen */}
      {world.introAudio && (
        <button
          onClick={(e) => { e.stopPropagation(); tryPlay(); }}
          style={{
            position: "absolute", top: 16, right: 16, zIndex: 2,
            background: "rgba(255,255,255,0.08)",
            border: "1px solid rgba(255,255,255,0.15)",
            color: "#fff", borderRadius: "10px",
            padding: "6px 12px", fontSize: "18px",
            cursor: "pointer",
          }}
          title="Play intro music"
        >🔊</button>
      )}

      {/* Card */}
      <div style={{
        position: "relative", zIndex: 2,
        width: "100%", maxWidth: "460px",
        maxHeight: "calc(100svh - 80px)",
        overflowY: "auto",
        borderRadius: "24px",
        padding: "28px 28px 32px",
        background: "rgba(255,255,255,0.04)",
        border: "1px solid rgba(255,255,255,0.10)",
        boxShadow: `0 8px 48px rgba(0,0,0,0.6), 0 0 0 1px ${world.accentColor}18`,
        display: "flex", flexDirection: "column", alignItems: "center",
        textAlign: "center", fontFamily: "Georgia,serif",
        scrollbarWidth: "none",
      }}>

        {/* Emoji badge */}
        <div style={{
          width: 80, height: 80, borderRadius: "22px",
          background: `${world.color}35`,
          border: `1.5px solid ${world.accentColor}55`,
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: "40px", marginBottom: "20px",
          boxShadow: `0 0 32px ${world.accentColor}25`,
        }}>
          {world.emoji}
        </div>

        {/* Eyebrow */}
        <div style={{
          color: world.accentColor, fontSize: "10px",
          letterSpacing: "3px", textTransform: "uppercase",
          fontWeight: "700", marginBottom: "8px",
        }}>
          Etymology Quest
        </div>

        {/* World name */}
        <div style={{
          color: "#fff", fontSize: "26px", fontWeight: "700",
          lineHeight: 1.2, marginBottom: "18px",
        }}>
          {world.name}
        </div>

        {/* Historical summary */}
        <div style={{
          color: "rgba(255,255,255,0.90)", fontSize: "14px",
          lineHeight: "1.75", marginBottom: "24px",
          textAlign: "left",
        }}>
          {world.historicalSummary}
        </div>

        {/* Historical facts */}
        <div style={{
          width: "100%", display: "flex", flexDirection: "column",
          gap: "10px", marginBottom: "32px",
        }}>
          {(world.historicalFacts || []).map((fact, i) => (
            <div key={i} style={{
              background: `${world.accentColor}10`,
              border: `1px solid ${world.accentColor}30`,
              borderLeft: `3px solid ${world.accentColor}`,
              borderRadius: "10px", padding: "12px 14px",
              textAlign: "left",
              display: "flex", alignItems: "flex-start", gap: "10px",
            }}>
              <span style={{
                color: world.accentColor, fontSize: "13px",
                flexShrink: 0, marginTop: "1px",
              }}>✦</span>
              <span style={{
                color: "rgba(255,255,255,0.82)", fontSize: "13px",
                lineHeight: "1.6",
              }}>{fact}</span>
            </div>
          ))}
        </div>

        {/* Enter World button */}
        <button
          onClick={() => stopAndDo(onBegin)}
          onMouseEnter={() => setHovered(true)}
          onMouseLeave={() => setHovered(false)}
          style={{
            background: world.color,
            border: "none", borderRadius: "14px",
            padding: "15px 48px",
            color: "#fff", fontSize: "16px", fontWeight: "700",
            cursor: "pointer", fontFamily: "Georgia,serif",
            letterSpacing: "0.5px",
            boxShadow: `0 4px 24px ${world.color}70`,
            transform: hovered ? "scale(1.04)" : "scale(1)",
            transition: "transform 0.18s ease, box-shadow 0.18s ease",
          }}
        >
          Enter World {world.emoji}
        </button>
      </div>
    </div>
  );
};

// ─── Word Chips Row ────────────────────────────────────────────────────────────
const WordChipsRow = ({
  words, solvedWords, previewSlots, syllableHints, definitionHints,
  goldLeaves, worldColor, accentColor,
  onDefinitionHint, onSyllableHint, shake
}) => {
  const [activeChip, setActiveChip] = useState(null);

  // Close popover when a word gets solved
  useEffect(() => {
    if (activeChip !== null && solvedWords.has(words[activeChip]?.word)) {
      setActiveChip(null);
    }
  }, [solvedWords, activeChip, words]);

  const previewText = previewSlots.join("");

  return (
    <>
      <div style={{
        display:"flex", gap:"8px", padding:"0 14px",
        overflowX:"auto", scrollbarWidth:"none",
        WebkitOverflowScrolling:"touch",
        position:"relative", zIndex:2,
        paddingBottom:"2px",
      }}>
        {words.map((w, wi) => {
          const solved = solvedWords.has(w.word);
          const targetText = w.roots.join("");
          const isPreviewing = !solved && previewText.length > 0 && targetText.startsWith(previewText);
          const sylRevealed = syllableHints.has(w.word);
          const sylHintChars = sylRevealed ? w.roots[0].length : 0;
          const isActive = activeChip === wi;

          return (
            <button
              key={wi}
              onClick={() => !solved && setActiveChip(isActive ? null : wi)}
              style={{
                flexShrink: 0,
                padding: "7px 12px",
                borderRadius: "20px",
                background: solved
                  ? `${worldColor}40`
                  : isPreviewing
                  ? `${accentColor}18`
                  : isActive
                  ? `${accentColor}20`
                  : "rgba(255,255,255,0.07)",
                border: solved
                  ? `1.5px solid ${accentColor}80`
                  : isPreviewing
                  ? `1.5px solid ${accentColor}70`
                  : isActive
                  ? `1.5px solid ${accentColor}50`
                  : "1px solid rgba(255,255,255,0.15)",
                cursor: solved ? "default" : "pointer",
                transition: "all 0.2s ease",
                boxShadow: solved
                  ? `0 0 10px ${accentColor}30`
                  : isActive
                  ? `0 0 12px ${accentColor}25`
                  : "none",
                animation: shake && !solved ? "shake 0.5s ease" : "none",
                display: "flex", flexDirection: "column", alignItems: "center", gap: "3px",
                minWidth: solved ? "auto" : "auto",
              }}
            >
              {/* Letter blanks or solved word */}
              <div style={{
                display: "flex", gap: "2px", alignItems: "center"
              }}>
                {w.word.split("").map((ch, ci) => {
                  const revealedByPreview = isPreviewing && ci < Math.round(previewText.length * (w.word.length / targetText.length));
                  const revealedBySyl = ci < sylHintChars;
                  const show = solved || revealedByPreview || revealedBySyl;
                  return (
                    <span key={ci} style={{
                      fontSize: show ? "12px" : "10px",
                      fontWeight: "800",
                      color: solved
                        ? accentColor
                        : revealedBySyl || revealedByPreview
                        ? accentColor
                        : "rgba(255,255,255,0.3)",
                      letterSpacing: solved ? "1px" : "0",
                      lineHeight: 1,
                    }}>
                      {show ? ch : "·"}
                    </span>
                  );
                })}
              </div>
              {/* Word length label if unsolved */}
              {!solved && (
                <span style={{
                  fontSize: "8px",
                  color: isActive ? `${accentColor}80` : "rgba(255,255,255,0.2)",
                  letterSpacing: "0.5px",
                }}>
                  {w.word.length} letters
                </span>
              )}
              {/* Tap hint dot for unsolved */}
              {!solved && !isActive && (
                <span style={{
                  width: 4, height: 4, borderRadius: "50%",
                  background: `${accentColor}50`,
                  display: "block",
                }}/>
              )}
            </button>
          );
        })}
      </div>

      {/* Popover / bottom sheet for active chip */}
      {activeChip !== null && !solvedWords.has(words[activeChip]?.word) && (
        <WordChipPopover
          word={words[activeChip]}
          worldColor={worldColor}
          accentColor={accentColor}
          goldLeaves={goldLeaves}
          defRevealed={definitionHints.has(words[activeChip]?.word)}
          sylRevealed={syllableHints.has(words[activeChip]?.word)}
          onDefinitionHint={(wordStr) => { onDefinitionHint(wordStr); /* keep open to show revealed def */ }}
          onSyllableHint={(wordStr) => { onSyllableHint(wordStr); setActiveChip(null); }}
          onClose={() => setActiveChip(null)}
        />
      )}
    </>
  );
};

// ─── Swipe Dial ───────────────────────────────────────────────────────────────
// ─── Sound Engine (Web Audio API — no external files needed) ──────────────────
const useSounds = () => {
  const ctxRef = useRef(null);

  const getCtx = () => {
    if (!ctxRef.current) {
      ctxRef.current = new (window.AudioContext || window.webkitAudioContext)();
    }
    // Resume if suspended (browser autoplay policy)
    if (ctxRef.current.state === "suspended") ctxRef.current.resume();
    return ctxRef.current;
  };

  // ── Tick: short sine pop, pitch rises with sequenceStep ──────────────────
  const playTick = useCallback((sequenceStep = 0) => {
    try {
      const ctx  = getCtx();
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      // Base 480 Hz, each step adds ~35 Hz (semitone-ish)
      const freq = 480 + sequenceStep * 35;
      osc.type = "sine";
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(freq * 0.85, ctx.currentTime + 0.06);
      gain.gain.setValueAtTime(0.18, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.07);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.08);
    } catch (_) {}
  }, []);

  // ── Success chime: bright major triad arpeggio ───────────────────────────
  const playSuccess = useCallback(() => {
    try {
      const ctx   = getCtx();
      const notes = [523.25, 659.25, 783.99]; // C5 E5 G5
      notes.forEach((freq, i) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = "triangle";
        const t = ctx.currentTime + i * 0.07;
        osc.frequency.setValueAtTime(freq, t);
        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.linearRampToValueAtTime(0.22, t + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.35);
        osc.start(t);
        osc.stop(t + 0.38);
      });
    } catch (_) {}
  }, []);

  // ── Error buzz: short dissonant low thud ────────────────────────────────
  const playError = useCallback(() => {
    try {
      const ctx  = getCtx();
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(120, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.12);
      gain.gain.setValueAtTime(0.25, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.18);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.2);
    } catch (_) {}
  }, []);

  // ── Level complete: sparkling upward flourish ────────────────────────────
  const playLevelComplete = useCallback(() => {
    try {
      const ctx = getCtx();
      // Rising scale of 8 bright sine notes with shimmer
      const scale = [523.25, 587.33, 659.25, 698.46, 783.99, 880, 987.77, 1046.50];
      scale.forEach((freq, i) => {
        const osc    = ctx.createOscillator();
        const gain   = ctx.createGain();
        // Add a gentle vibrato via a second LFO oscillator
        const lfo    = ctx.createOscillator();
        const lfoGain = ctx.createGain();
        lfo.connect(lfoGain);
        lfoGain.connect(osc.frequency);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = "sine";
        lfo.type = "sine";
        lfo.frequency.setValueAtTime(6, ctx.currentTime);
        lfoGain.gain.setValueAtTime(4, ctx.currentTime);
        const t = ctx.currentTime + i * 0.065;
        osc.frequency.setValueAtTime(freq, t);
        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.linearRampToValueAtTime(0.16, t + 0.04);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.55);
        lfo.start(t);
        lfo.stop(t + 0.6);
        osc.start(t);
        osc.stop(t + 0.6);
      });
      // Final bright shimmer chord at the top
      [1046.50, 1318.51, 1567.98].forEach((freq, i) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = "sine";
        const t = ctx.currentTime + 0.52 + i * 0.04;
        osc.frequency.setValueAtTime(freq, t);
        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.linearRampToValueAtTime(0.12, t + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.6);
        osc.start(t);
        osc.stop(t + 0.65);
      });
    } catch (_) {}
  }, []);

  return { playTick, playSuccess, playError, playLevelComplete };
};

const SwipeDial = ({ chunks, completedRoots, accentColor, worldColor, onSwipeComplete, onSwipeWrong, onSwipeMove, meaning, playTick, playError }) => {
  // ── Dynamic geometry: scale dial to fit 4–8 nodes without crowding ──────
  const nodeCount     = chunks.length;
  // Dial container stays fixed; radius and node size shrink as count grows
  const DIAL_SIZE     = 286;
  const CENTER        = DIAL_SIZE / 2;
  // DIAL_R: 96px for 4 nodes → 88px for 8 nodes (linear interpolation)
  const DIAL_R        = Math.round(106 - (nodeCount - 4) * 2);
  // Nodes shrink slightly: 54×38 at 4 nodes → 44×32 at 8 nodes
  const NODE_W        = Math.max(48, Math.round(59 - (nodeCount - 4) * 2.5));
  const NODE_H        = Math.max(35, Math.round(42 - (nodeCount - 4) * 1.5));
  // Hit radius also scales with node size
  const HIT_THRESHOLD = Math.max(26, Math.round(33 - (nodeCount - 4) * 1.5));
  // Stroke widths thin out at 6+ nodes to reduce visual clutter
  const STROKE_CORE   = nodeCount >= 6 ? 2   : 3;
  const STROKE_GLOW   = nodeCount >= 6 ? 10  : 14;
  const STROKE_RB     = nodeCount >= 6 ? 2   : 2.5;  // rubber-band line
  const STROKE_RB_GLW = nodeCount >= 6 ? 7   : 10;

  const nodePositions = useMemo(() =>
    chunks.map((_, i) => {
      const angle = (i / chunks.length) * Math.PI * 2 - Math.PI / 2;
      return { x: CENTER + DIAL_R * Math.cos(angle), y: CENTER + DIAL_R * Math.sin(angle) };
    }),
  [chunks]);

  const chunksRef          = useRef(chunks);
  const completedRootsRef  = useRef(completedRoots);
  const nodePositionsRef   = useRef(nodePositions);
  const onSwipeMoveRef     = useRef(onSwipeMove);
  const onSwipeCompleteRef = useRef(onSwipeComplete);
  const onSwipeWrongRef    = useRef(onSwipeWrong);

  useEffect(() => { chunksRef.current         = chunks;         }, [chunks]);
  useEffect(() => { completedRootsRef.current  = completedRoots; }, [completedRoots]);
  useEffect(() => { nodePositionsRef.current   = nodePositions;  }, [nodePositions]);
  useEffect(() => { onSwipeMoveRef.current     = onSwipeMove;    }, [onSwipeMove]);
  useEffect(() => { onSwipeCompleteRef.current = onSwipeComplete;}, [onSwipeComplete]);
  useEffect(() => { onSwipeWrongRef.current    = onSwipeWrong;   }, [onSwipeWrong]);

  const containerRef = useRef(null);
  const swipeRef     = useRef({ active: false, selected: [], lastNodeIdx: -1 });

  const [selectedIdxs, setSelectedIdxs] = useState([]);
  const [fingerPos,    setFingerPos]    = useState(null);
  const [flashState,   setFlashState]   = useState("idle");

  useEffect(() => {
    swipeRef.current = { active: false, selected: [], lastNodeIdx: -1 };
    setSelectedIdxs([]);
    setFingerPos(null);
    setFlashState("idle");
  }, [chunks]);

  const toLocal = useCallback((touch) => {
    const rect = containerRef.current.getBoundingClientRect();
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
  }, []);

  const checkHit = useCallback((localPos) => {
    return nodePositionsRef.current.findIndex(pos => {
      const dx = localPos.x - pos.x;
      const dy = localPos.y - pos.y;
      return Math.sqrt(dx * dx + dy * dy) < HIT_THRESHOLD;
    });
  }, []);

  const handleTouchStart = useCallback((e) => {
    e.preventDefault();
    const touch   = e.touches[0];
    const local   = toLocal(touch);
    const idx     = checkHit(local);
    const chunks_ = chunksRef.current;
    const done_   = completedRootsRef.current;
    if (idx === -1 || done_.includes(chunks_[idx].chunk)) return;
    swipeRef.current = { active: true, selected: [idx], lastNodeIdx: idx };
    setSelectedIdxs([idx]);
    setFingerPos(local);
    setFlashState("idle");
    onSwipeMoveRef.current?.([chunks_[idx].chunk]);
    playTick?.(0);
  }, [toLocal, checkHit]);

  const handleTouchMove = useCallback((e) => {
    e.preventDefault();
    const s = swipeRef.current;
    if (!s.active) return;
    const touch   = e.touches[0];
    const local   = toLocal(touch);
    setFingerPos(local);
    const idx     = checkHit(local);
    const chunks_ = chunksRef.current;
    const done_   = completedRootsRef.current;
    if (idx !== -1 && idx !== s.lastNodeIdx && !s.selected.includes(idx) && !done_.includes(chunks_[idx].chunk)) {
      s.selected    = [...s.selected, idx];
      s.lastNodeIdx = idx;
      setSelectedIdxs([...s.selected]);
      onSwipeMoveRef.current?.(s.selected.map(i => chunks_[i].chunk));
      playTick?.(s.selected.length - 1);
    }
  }, [toLocal, checkHit]);

  const handleTouchEnd = useCallback((e) => {
    e.preventDefault();
    const s = swipeRef.current;
    if (!s.active) return;
    s.active = false;
    setFingerPos(null);
    if (s.selected.length < 2) {
      setSelectedIdxs([]);
      swipeRef.current.selected = [];
      onSwipeMoveRef.current?.([]);
      return;
    }
    const chunks_    = chunksRef.current;
    const swipedText = s.selected.map(i => chunks_[i].chunk).join("");
    const matched    = onSwipeCompleteRef.current(swipedText);
    if (matched) {
      setFlashState("success");
      onSwipeMoveRef.current?.([]);
      setTimeout(() => { setSelectedIdxs([]); setFlashState("idle"); swipeRef.current.selected = []; }, 500);
    } else {
      setFlashState("wrong");
      onSwipeWrongRef.current?.();
      playError?.();
      setTimeout(() => { setSelectedIdxs([]); setFlashState("idle"); swipeRef.current.selected = []; onSwipeMoveRef.current?.([]); }, 420);
    }
  }, []);

  const lineColor  = flashState === "success" ? "#66ff88" : flashState === "wrong" ? "#ff4455" : accentColor;
  const glowColor  = flashState === "success" ? "#00ff6688" : flashState === "wrong" ? "#ff000066" : accentColor + "55";
  const confirmedPoints = selectedIdxs.map(i => nodePositions[i]);
  const lastConfirmed   = confirmedPoints.length > 0 ? confirmedPoints[confirmedPoints.length - 1] : null;

  return (
    <div ref={containerRef}
      style={{ width:DIAL_SIZE, height:DIAL_SIZE, position:"relative", touchAction:"none", userSelect:"none" }}
      onTouchStart={handleTouchStart}
      onTouchMove={handleTouchMove}
      onTouchEnd={handleTouchEnd}
    >
      <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none"}} viewBox={`0 0 ${DIAL_SIZE} ${DIAL_SIZE}`}>
        <circle cx={CENTER} cy={CENTER} r={CENTER-4} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="1.5"/>
        <circle cx={CENTER} cy={CENTER} r={DIAL_R-30} fill={`${worldColor}08`} stroke={`${worldColor}18`} strokeWidth="1"/>
        {chunks.map((_,i) => {
          const a = (i/chunks.length)*Math.PI*2 - Math.PI/2;
          return <line key={i}
            x1={CENTER+(DIAL_R-30)*Math.cos(a)} y1={CENTER+(DIAL_R-30)*Math.sin(a)}
            x2={CENTER+(DIAL_R+18)*Math.cos(a)} y2={CENTER+(DIAL_R+18)*Math.sin(a)}
            stroke="rgba(255,255,255,0.04)" strokeWidth="1"/>;
        })}
      </svg>

      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
        <div style={{color:"rgba(255,255,255,0.15)",fontSize:"9px",letterSpacing:"0.5px",textAlign:"center",maxWidth:"80px",lineHeight:1.5}}>
          {selectedIdxs.length > 0 ? selectedIdxs.map(i => chunks[i].chunk).join(" + ") : meaning}
        </div>
      </div>

      {chunks.map((item,i) => {
        const {x,y}     = nodePositions[i];
        const isCompleted = completedRoots.includes(item.chunk);
        const isSelected  = selectedIdxs.includes(i);
        const orderNum    = isSelected ? selectedIdxs.indexOf(i)+1 : null;
        return (
          <div key={i} style={{
            position:"absolute", left:x-NODE_W/2, top:y-NODE_H/2, width:NODE_W, height:NODE_H,
            borderRadius:"12px",
            background: isCompleted
                ? `${worldColor}55`
                : isSelected
                ? `${accentColor}28`
                : item.fogHidden
                ? `${accentColor}10`
                : "rgba(255,255,255,0.09)",
            border: isCompleted
                ? `2px solid ${accentColor}cc`
                : isSelected
                ? `2px solid ${accentColor}`
                : item.fogHidden
                ? `1px dashed ${accentColor}60`
                : "1px solid rgba(255,255,255,0.18)",
            color: isCompleted ? accentColor : isSelected ? "#fff" : "rgba(255,255,255,0.88)",
            fontSize:"13px", fontWeight:"700", letterSpacing:"0.5px",
            display:"flex", alignItems:"center", justifyContent:"center",
            boxShadow: isSelected ? `0 0 18px ${accentColor}70` : isCompleted ? `0 0 12px ${accentColor}44` : "none",
            transform: isSelected ? "scale(1.12)" : "scale(1)",
            transition:"transform 0.15s ease,box-shadow 0.15s ease,background 0.15s ease,border 0.15s ease",
            pointerEvents:"auto", cursor:"default",
          }}>
            {isCompleted ? "✓" : item.chunk}
            {isSelected && !isCompleted && (
              <span style={{position:"absolute",top:-7,right:-7,width:16,height:16,borderRadius:"50%",
                background:accentColor,color:"#000",fontSize:"9px",fontWeight:"800",
                display:"flex",alignItems:"center",justifyContent:"center",
                boxShadow:`0 0 6px ${accentColor}`}}>{orderNum}</span>
            )}
          </div>
        );
      })}

      <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none",overflow:"visible"}} viewBox={`0 0 ${DIAL_SIZE} ${DIAL_SIZE}`}>
        <defs>
          <filter id="glow2">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        {confirmedPoints.length > 1 && <>
          <polyline points={confirmedPoints.map(p=>`${p.x},${p.y}`).join(" ")} fill="none" stroke={glowColor} strokeWidth={STROKE_GLOW} strokeLinecap="round" strokeLinejoin="round"/>
          <polyline points={confirmedPoints.map(p=>`${p.x},${p.y}`).join(" ")} fill="none" stroke={lineColor} strokeWidth={STROKE_CORE} strokeLinecap="round" strokeLinejoin="round" filter="url(#glow2)"/>
        </>}
        {lastConfirmed && fingerPos && <>
          <line x1={lastConfirmed.x} y1={lastConfirmed.y} x2={fingerPos.x} y2={fingerPos.y} stroke={glowColor} strokeWidth={STROKE_RB_GLW} strokeLinecap="round" strokeDasharray="6 5"/>
          <line x1={lastConfirmed.x} y1={lastConfirmed.y} x2={fingerPos.x} y2={fingerPos.y} stroke={lineColor} strokeWidth={STROKE_RB} strokeLinecap="round" strokeDasharray="6 5" opacity="0.85"/>
        </>}
        {confirmedPoints.map((p,i) => <circle key={i} cx={p.x} cy={p.y} r={5} fill={lineColor} filter="url(#glow2)"/>)}
        {fingerPos && <circle cx={fingerPos.x} cy={fingerPos.y} r={7} fill={lineColor} opacity="0.6"/>}
      </svg>
    </div>
  );
};

function EtymRoot() {
  const [screen,          setScreen]          = useState("home");
  const [worldIdx,        setWorldIdx]        = useState(0);
  const [levelIdx,        setLevelIdx]        = useState(0);
  const [completedWorlds, setCompletedWorlds] = useState([]);
  const [unlockedWords,   setUnlockedWords]   = useState({});
  const [solvedWords,     setSolvedWords]     = useState(new Set());
  const [previewSlots,    setPreviewSlots]    = useState([]);
  const [showFact,        setShowFact]        = useState(false);
  const [pendingFacts,    setPendingFacts]    = useState([]);
  const [goldLeaves,      setGoldLeaves]      = useState(0);
  const { playTick, playSuccess, playError, playLevelComplete } = useSounds();
  const [definitionHints, setDefinitionHints] = useState(new Set());
  const [syllableHints,   setSyllableHints]   = useState(new Set());
  const [leafBurst,       setLeafBurst]       = useState(false);
  const [shake,           setShake]           = useState(false);
  const [score,           setScore]           = useState(0);
  const [timeLeft,        setTimeLeft]        = useState(60);
  const [timerActive,     setTimerActive]     = useState(false);
  const [chunks,          setChunks]          = useState([]);
  const [activeMilestone, setActiveMilestone] = useState(null);  // milestone to show, or null
  const timerRef = useRef(null);

  const world = WORLDS[worldIdx];
  const level = world?.levels[levelIdx];

  const completedRoots = useMemo(() => {
    if (!level) return [];
    const usedInSolved      = new Set();
    const neededForUnsolved = new Set();
    level.words.forEach(w => {
      if (solvedWords.has(w.word)) w.roots.forEach(r => usedInSolved.add(r));
      else                         w.roots.forEach(r => neededForUnsolved.add(r));
    });
    const exhausted = [];
    usedInSolved.forEach(root => { if (!neededForUnsolved.has(root)) exhausted.push(root); });
    return exhausted;
  }, [level, solvedWords]);

  const buildChunks = useCallback((lvl, worldHasFog) => {
    const arr = lvl.chunks.map(c => ({ chunk: c, fogHidden: false }));
    // Fisher-Yates shuffle
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    // Fog of War: randomly hide 1–2 non-root letters visually as '?'
    // The underlying chunk value stays intact for swipe validation
    if (worldHasFog) {
      // Collect indices that are trap tiles (not needed for any word root)
      const allRoots = new Set(lvl.words.flatMap(w => w.roots));
      const trapIndices = arr.reduce((acc, item, idx) => {
        if (!allRoots.has(item.chunk)) acc.push(idx);
        return acc;
      }, []);
      // If not enough traps, also fog some root tiles
      const fogPool = trapIndices.length >= 2
        ? trapIndices
        : arr.map((_, idx) => idx);
      // Pick 1 or 2 random indices to fog
      const fogCount = Math.min(Math.floor(Math.random() * 2) + 1, fogPool.length);
      const shuffled = [...fogPool].sort(() => Math.random() - 0.5);
      shuffled.slice(0, fogCount).forEach(idx => { arr[idx].fogHidden = true; });
    }
    return arr;
  }, []);

  useEffect(() => {
    if (level) {
      setChunks(buildChunks(level, world?.hasFog ?? false));
      setSolvedWords(new Set());
      setPreviewSlots([]);
      setShowFact(false);
      setPendingFacts([]);
      setDefinitionHints(new Set());
      setSyllableHints(new Set());
      setTimeLeft(60);
      setShake(false);
      setActiveMilestone(null);
    }
  }, [worldIdx, levelIdx, level, buildChunks]);

  useEffect(() => {
    if (screen === "game") setTimerActive(true);
    else setTimerActive(false);
  }, [screen]);

  useEffect(() => {
    if (timerActive && timeLeft > 0) {
      timerRef.current = setTimeout(() => setTimeLeft(t => t - 1), 1000);
    } else if (timeLeft === 0 && timerActive) {
      setTimerActive(false);
      setShake(true);
      setTimeout(() => setShake(false), 500);
    }
    return () => clearTimeout(timerRef.current);
  }, [timerActive, timeLeft]);

  const handleSwipeComplete = useCallback((swipedText) => {
    if (!level || showFact) return false;
    const match = level.words.find(w => w.roots.join("") === swipedText);
    if (!match || solvedWords.has(match.word)) return false;

    const newSolved = new Set(solvedWords);
    newSolved.add(match.word);
    setSolvedWords(newSolved);
    playSuccess();
    setPendingFacts(prev => [...prev, { word: match.word, fact: match.fact }]);
    setScore(prev => prev + Math.max(10, timeLeft));
    setGoldLeaves(prev => prev + 10);
    setLeafBurst(true);
    setTimeout(() => setLeafBurst(false), 600);

    const allDone = level.words.every(w => newSolved.has(w.word));
    if (allDone) {
      setTimerActive(false);
      playLevelComplete();
      // Check if this level is a milestone boundary
      const milestones = world?.milestones || [];
      const hitMilestone = milestones.find(m => m.afterLevel === levelIdx + 1);
      if (hitMilestone) {
        setActiveMilestone(hitMilestone);
      } else {
        setShowFact(true);
      }
      setUnlockedWords(prev => {
        const updated = { ...prev };
        if (!updated[world.id]) updated[world.id] = [];
        level.words.forEach(w => { if (!updated[world.id].includes(w.word)) updated[world.id].push(w.word); });
        return updated;
      });
    }
    return true;
  }, [level, showFact, solvedWords, timeLeft, world]);

  const handleSwipeWrong = useCallback(() => {
    setShake(true);
    setTimeout(() => setShake(false), 500);
  }, []);

  const handleDefinitionHint = useCallback((wordStr) => {
    if (goldLeaves < 50) return;
    setGoldLeaves(prev => prev - 50);
    setDefinitionHints(prev => new Set([...prev, wordStr]));
  }, [goldLeaves]);

  const handleSyllableHint = useCallback((wordStr) => {
    if (goldLeaves < 100) return;
    setGoldLeaves(prev => prev - 100);
    setSyllableHints(prev => new Set([...prev, wordStr]));
  }, [goldLeaves]);

  const handleNext = () => {
    const isLast = levelIdx >= world.levels.length - 1;
    if (isLast) {
      setCompletedWorlds(prev => prev.includes(world.id) ? prev : [...prev, world.id]);
      setScreen("worldComplete");
    } else {
      setLevelIdx(prev => prev + 1);
    }
  };

  const startGame = (wIdx = 0, lIdx = 0) => {
    setWorldIdx(wIdx);
    setLevelIdx(lIdx);
    // Show intro screen only if the world has intro data and it's a fresh start (lIdx===0)
    const hasIntro = !!(WORLDS[wIdx]?.intro || WORLDS[wIdx]?.historicalSummary);
    setScreen(hasIntro && lIdx === 0 ? "worldIntro" : "game");
  };

  const timerPct   = timeLeft / 60;
  const timerColor = timeLeft > 30 ? "#8de87a" : timeLeft > 15 ? "#f5c030" : "#e87a6d";
  const circ       = 2 * Math.PI * 20;

  if (screen === "tree") return <LanguageTree completedWorlds={completedWorlds} unlockedWords={unlockedWords} onClose={() => setScreen("home")}/>;

  if (activeMilestone) {
    return (
      <MilestoneScreen
        milestone={activeMilestone}
        world={world}
        onContinue={() => {
          setActiveMilestone(null);
          setShowFact(true);
        }}
      />
    );
  }

  if (screen === "worldIntro" && (world?.intro || world?.historicalSummary)) {
    return (
      <WorldIntroScreen
        world={world}
        onBegin={() => { setLevelIdx(0); setScreen("game"); }}
        onBack={() => setScreen("home")}
      />
    );
  }


  if (screen === "worldComplete") {
    const nextWorld = WORLDS[worldIdx + 1];
    return (
      <div style={{minHeight:"100svh",background:world.bgGradient,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"Georgia,serif",padding:"30px 20px",textAlign:"center"}}>
        <div style={{fontSize:"60px",marginBottom:"16px"}}>🌳</div>
        <div style={{color:world.accentColor,fontSize:"12px",letterSpacing:"3px",textTransform:"uppercase",marginBottom:"8px"}}>World Complete</div>
        <div style={{color:"#fff",fontSize:"28px",fontWeight:"700",marginBottom:"8px"}}>{world.name}</div>
        <div style={{color:"rgba(255,255,255,0.6)",fontSize:"14px",marginBottom:"28px"}}>A new branch grew on your Language Tree!</div>
        <div style={{background:"rgba(255,255,255,0.08)",border:`1px solid ${world.accentColor}30`,borderRadius:"16px",padding:"16px 24px",marginBottom:"24px",width:"100%",maxWidth:"280px"}}>
          <div style={{color:world.accentColor,fontSize:"11px",letterSpacing:"2px",marginBottom:"8px"}}>WORDS UNLOCKED</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"8px",justifyContent:"center"}}>
            {(unlockedWords[world.id]||[]).map((w,i)=><span key={i} style={{background:`${world.accentColor}20`,border:`1px solid ${world.accentColor}50`,color:world.accentColor,borderRadius:"20px",padding:"4px 12px",fontSize:"13px",fontWeight:"600"}}>{w}</span>)}
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:"10px",width:"100%",maxWidth:"280px"}}>
          {nextWorld&&<button onClick={()=>startGame(worldIdx+1,0)} style={{background:nextWorld.color,border:"none",borderRadius:"14px",padding:"16px",color:"#fff",fontSize:"16px",fontWeight:"700",cursor:"pointer"}}>{nextWorld.emoji} Start {nextWorld.name}</button>}
          <button onClick={()=>setScreen("tree")} style={{background:"transparent",border:`1px solid ${world.accentColor}50`,borderRadius:"14px",padding:"14px",color:world.accentColor,fontSize:"14px",fontWeight:"600",cursor:"pointer"}}>🌳 View Language Tree</button>
          <button onClick={()=>setScreen("home")} style={{background:"transparent",border:"none",color:"rgba(255,255,255,0.4)",fontSize:"13px",cursor:"pointer",padding:"8px"}}>Back to Home</button>
        </div>
      </div>
    );
  }

  if (screen === "home") {
    return (
      <div style={{minHeight:"100svh",background:"linear-gradient(180deg,#0a0f1a 0%,#0d180e 60%,#0a1208 100%)",display:"flex",flexDirection:"column",alignItems:"center",fontFamily:"Georgia,serif",padding:"0 20px 40px",overflowY:"auto"}}>
        <div style={{paddingTop:"50px",textAlign:"center",marginBottom:"8px"}}>
          <div style={{fontSize:"52px",marginBottom:"12px"}}>🌳</div>
          <div style={{color:"#8de87a",fontSize:"11px",letterSpacing:"4px",textTransform:"uppercase",marginBottom:"6px"}}>Etymology Quest</div>
          <div style={{color:"#fff",fontSize:"32px",fontWeight:"700",lineHeight:1.2,marginBottom:"6px"}}>EtymRoot</div>
          <div style={{color:"rgba(255,255,255,0.45)",fontSize:"13px",lineHeight:1.6,maxWidth:"260px",margin:"0 auto 30px"}}>
            Swipe across roots to build English words — and discover where they truly come from.
          </div>
        </div>
        {score>0&&<div style={{background:"rgba(141,232,122,0.1)",border:"1px solid #8de87a30",borderRadius:"12px",padding:"10px 20px",marginBottom:"20px",color:"#8de87a",fontSize:"13px"}}>⭐ Your Score: <strong>{score}</strong></div>}
        <div style={{width:"100%",maxWidth:"340px",display:"flex",flexDirection:"column",gap:"12px",marginBottom:"20px"}}>
          {WORLDS.map((w,i)=>{
            const done=completedWorlds.includes(w.id);
            const unlocked=true;
            return <button key={w.id} onClick={()=>unlocked&&startGame(i,0)} style={{background:done?`${w.color}22`:unlocked?"rgba(255,255,255,0.06)":"rgba(255,255,255,0.02)",border:`1px solid ${done?w.color+"60":unlocked?"rgba(255,255,255,0.12)":"rgba(255,255,255,0.04)"}`,borderRadius:"16px",padding:"16px 18px",cursor:unlocked?"pointer":"default",display:"flex",alignItems:"center",gap:"14px",width:"100%",textAlign:"left"}}>
              <div style={{width:"44px",height:"44px",borderRadius:"12px",background:`${w.color}30`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"22px",flexShrink:0}}>{unlocked?w.emoji:"🔒"}</div>
              <div style={{flex:1}}>
                <div style={{color:unlocked?"#fff":"#444",fontSize:"14px",fontWeight:"700",marginBottom:"2px"}}>{w.name}</div>
                <div style={{color:unlocked?"rgba(255,255,255,0.4)":"#333",fontSize:"11px"}}>{done?`✓ Complete · ${(unlockedWords[w.id]||[]).length} words`:unlocked?`${w.levels.length} levels`:"Complete previous world"}</div>
              </div>
              {done&&<span style={{color:w.color,fontSize:"18px"}}>✓</span>}
            </button>;
          })}
        </div>
        <button onClick={()=>setScreen("tree")} style={{background:"transparent",border:"1px solid #8de87a40",borderRadius:"14px",padding:"14px 28px",color:"#8de87a",fontSize:"14px",fontWeight:"600",cursor:"pointer"}}>🌳 Language Tree {completedWorlds.length>0&&`(${Object.values(unlockedWords).flat().length} words)`}</button>
      </div>
    );
  }

  // ── Game Screen ──────────────────────────────────────────────────────────────
  // Layout: fixed header, compact chips row, then remaining space = dial centred
  return (
    <div style={{
      height:"100svh",
      display:"flex", flexDirection:"column",
      overflow:"hidden", fontFamily:"Georgia,serif",
      position:"relative", userSelect:"none",
      backgroundImage: world.bgImageUrl
        ? `url(${world.bgImageUrl})`
        : world.bgGradient,
      backgroundSize: "cover",
      backgroundPosition: "center top",
    }}>
      {/* Dark gradient overlay for text readability */}
      <div style={{
        position:"absolute", inset:0, zIndex:1,
        background: "linear-gradient(180deg, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.55) 40%, rgba(0,0,0,0.78) 100%)",
        pointerEvents:"none",
      }}/>
      {/* Full-screen background art */}


      {/* ── Header ── */}
      <div style={{display:"flex",alignItems:"center",padding:"14px 16px 8px",position:"relative",zIndex:2,flexShrink:0}}>
        <button onClick={()=>setScreen("home")} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:"#fff",borderRadius:"10px",padding:"6px 12px",fontSize:"13px",cursor:"pointer"}}>← Home</button>
        <div style={{flex:1,textAlign:"center"}}>
          <div style={{color:world.accentColor,fontSize:"10px",letterSpacing:"2px",textTransform:"uppercase"}}>{world.emoji} {world.name.split(" ").slice(-1)[0]}</div>
          <div style={{color:"rgba(255,255,255,0.5)",fontSize:"11px"}}>Level {levelIdx+1} / {world.levels.length}</div>
        </div>
        <button onClick={()=>setScreen("tree")} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:"#fff",borderRadius:"10px",padding:"6px 12px",fontSize:"13px",cursor:"pointer"}}>🌳</button>
      </div>

      {/* ── Status bar: Leaves · Timer · Words ── */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 16px 8px",position:"relative",zIndex:2,flexShrink:0}}>
        <div style={{
          display:"flex",alignItems:"center",gap:"5px",
          background: leafBurst?"rgba(255,215,0,0.18)":"rgba(255,255,255,0.06)",
          border:`1px solid ${leafBurst?"rgba(255,215,0,0.5)":"rgba(255,255,255,0.12)"}`,
          borderRadius:"20px",padding:"4px 10px",transition:"all 0.3s ease",
        }}>
          <span style={{fontSize:"14px"}}>🍂</span>
          <span style={{color:leafBurst?"#ffd700":"#e8b86d",fontSize:"13px",fontWeight:"700",transition:"color 0.3s"}}>{goldLeaves}</span>
        </div>
        <svg width="44" height="44" viewBox="0 0 48 48">
          <circle cx="24" cy="24" r="20" fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="3"/>
          <circle cx="24" cy="24" r="20" fill="none" stroke={timerColor} strokeWidth="3" strokeLinecap="round"
            strokeDasharray={circ} strokeDashoffset={circ*(1-timerPct)}
            transform="rotate(-90 24 24)" style={{transition:"stroke-dashoffset 1s linear,stroke 0.5s"}}/>
          <text x="24" y="28" textAnchor="middle" fill={timerColor} fontSize="12" fontWeight="700">{timeLeft}</text>
        </svg>
        <div style={{color:"rgba(255,255,255,0.5)",fontSize:"12px",textAlign:"right"}}>
          <div>{solvedWords.size}/{level?.words.length}</div>
          <div style={{fontSize:"10px",color:"rgba(255,255,255,0.3)"}}>words</div>
        </div>
      </div>

      {/* ── Level clue ── */}
      <div style={{
        margin:"0 14px 8px",padding:"7px 12px",
        background:"rgba(255,255,255,0.05)",border:`1px solid ${world.accentColor}30`,
        borderRadius:"12px",position:"relative",zIndex:2,
        display:"flex",alignItems:"center",gap:"8px",flexShrink:0,
      }}>
        <span style={{fontSize:"13px"}}>🔍</span>
        <div style={{flex:1,color:"rgba(255,255,255,0.65)",fontSize:"11px",lineHeight:1.4,fontStyle:"italic"}}>
          {level?.clue}
        </div>
      </div>

      {/* ── Word Chips Row — compact horizontal scroll ── */}
      {!showFact && (
        <div style={{flexShrink:0, marginBottom:"6px", position:"relative", zIndex:2}}>
          <WordChipsRow
            words={level?.words || []}
            solvedWords={solvedWords}
            previewSlots={previewSlots}
            syllableHints={syllableHints}
            definitionHints={definitionHints}
            goldLeaves={goldLeaves}
            worldColor={world.color}
            accentColor={world.accentColor}
            onDefinitionHint={handleDefinitionHint}
            onSyllableHint={handleSyllableHint}
            shake={shake}
          />
        </div>
      )}

      {/* ── Fun Facts panel (replaces dial area when level complete) ── */}
      {showFact && (
        <div style={{
          flex:1, margin:"0 14px", overflow:"hidden",
          background:`${world.color}18`, border:`1px solid ${world.accentColor}40`,
          borderRadius:"14px", padding:"12px 14px",
          position:"relative", zIndex:2,
          display:"flex", flexDirection:"column",
        }}>
          <div style={{color:world.accentColor,fontSize:"11px",letterSpacing:"2px",marginBottom:"8px",flexShrink:0}}>✨ DID YOU KNOW?</div>
          <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:"10px"}}>
            {pendingFacts.map((f,i) => (
              <div key={i}>
                <div style={{color:"#fff",fontSize:"11px",fontWeight:"700",marginBottom:"3px",letterSpacing:"1px"}}>{f.word}</div>
                <div style={{color:"rgba(255,255,255,0.75)",fontSize:"11px",lineHeight:1.6}}>{f.fact}</div>
              </div>
            ))}
          </div>
          <div style={{marginTop:"12px",display:"flex",justifyContent:"center",flexShrink:0}}>
            <button onClick={handleNext} style={{background:world.color,border:"none",borderRadius:"12px",padding:"12px 32px",color:"#fff",fontSize:"14px",fontWeight:"700",cursor:"pointer",boxShadow:`0 4px 18px ${world.color}60`}}>
              {levelIdx>=world.levels.length-1?"Complete World 🌳":"Next Level →"}
            </button>
          </div>
        </div>
      )}

      {/* ── Swipe Dial — takes all remaining flex space, centred ── */}
      {!showFact && (
        <div style={{
          flex:1, display:"flex", flexDirection:"column",
          alignItems:"center", justifyContent:"center",
          position:"relative", zIndex:2,
          paddingBottom:"8px",
        }}>
          <div style={{color:"rgba(255,255,255,0.25)",fontSize:"10px",letterSpacing:"2px",marginBottom:"8px",textTransform:"uppercase"}}>
            Swipe across the roots
          </div>
          <SwipeDial
            key={`${worldIdx}-${levelIdx}`}
            chunks={chunks}
            completedRoots={completedRoots}
            accentColor={world.accentColor}
            worldColor={world.color}
            onSwipeComplete={handleSwipeComplete}
            onSwipeWrong={handleSwipeWrong}
            onSwipeMove={setPreviewSlots}
            meaning={level?.clue}
            playTick={playTick}
            playError={playError}
          />
        </div>
      )}

      <style>{`
        @keyframes shake {
          0%,100%{transform:translateX(0)}
          20%{transform:translateX(-8px)}
          40%{transform:translateX(8px)}
          60%{transform:translateX(-5px)}
          80%{transform:translateX(5px)}
        }
        @keyframes fogPulse {
          0%,100%{opacity:0.3;transform:scale(1)}
          50%{opacity:0.8;transform:scale(1.06)}
        }
        ::-webkit-scrollbar { display: none; }
      `}</style>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<EtymRoot />);
  </script>
</body>
</html>
